    <meta name="twitter:card"

    <style>
        :root {
            color-scheme: dark;
            --background: #08111f;
            --panel: #111d2e;
            --text: #edf4ff;
            --muted: #a9b8cc;
            --accent: #70c8ff;
            --border: #2b425f;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
        }

        body {
            margin: 0;
            background: var(--background);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
        }

        .page {
            min-height: 100%;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 18px 24px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
        }

        .header-content {
            width: min(1400px, 100%);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        h1 {
            margin: 0;
            font-size: clamp(1.1rem, 3vw, 1.6rem);
        }

        .subtitle {
            margin: 4px 0 0;
            color: var(--muted);
            font-size: 0.9rem;
        }

        .buttons {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .button {
            display: inline-block;
            padding: 10px 15px;
            border: 1px solid var(--accent);
            border-radius: 7px;
            color: var(--accent);
            text-decoration: none;
            font-weight: bold;
        }

        .button:hover {
            background: rgba(112, 200, 255, 0.12);
        }

        .viewer {
            flex: 1;
            min-height: 700px;
        }

        iframe {
            display: block;
            width: 100%;
            height: calc(100vh - 100px);
            min-height: 700px;
            border: 0;
            background: white;
        }

        .mobile-note {
            display: none;
            padding: 16px;
            color: var(--muted);
            text-align: center;
        }

        @media (max-width: 700px) {
            .header-content {
                align-items: flex-start;
                flex-direction: column;
            }

            .buttons {
                width: 100%;
            }

            .button {
                flex: 1;
                text-align: center;
            }

            iframe {
                height: calc(100vh - 175px);
            }

            .mobile-note {
                display: block;
            }
        }
    </style>
</head>

<body>
    <div class="page">
        <header>
            <div class="header-content">
                <div>
                    <h1>
                        Star Trek: Attack Wing — Quickstart (Rev. 9.14.17)
                    </h1>

                    <p class="subtitle">
                        Nova Squadron Library
                    </p>
                </div>

                <div class="buttons">
                    <a class="button"
                       href="../../">
                        Library
                    </a>

                    <a class="button"
                       href="../../Star%20Trek%20Attack%20Wing/Rulebooks/Core%20Rules/STAW%20Quickstart%20-%20Rev%209.14.17.pdf"
                       target="_blank">
                        Open PDF
                    </a>
                </div>
            </div>
        </header>

        <main class="viewer">
            <p class="mobile-note">
                If the document does not appear below, use the Open PDF button.
            </p>

            <iframe
                src="../../Star%20Trek%20Attack%20Wing/Rulebooks/Core%20Rules/STAW%20Rulebook%20-%20Rev%209.14.17.pdf#view=FitH"
                title="Star Trek Attack Wing Quickstart Revision 9.14.17">
            </iframe>
        </main>
    </div>
</body>
</html>
